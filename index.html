<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<link rel="icon" href="/favicon.ico">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TIFY</title>
	<style>
		:root {
			--base-color: #06b;
			--base-color-lighter: #e6f0f8;
			--border-color: rgba(0, 0, 0, .2);
			--button-hover-bg: #0058a2;
		}

		*,
		*::before,
		*::after {
			margin: 0;
			padding: 0;
			font: inherit;
		}

		html {
			background: #666;
			color: #333;
			font-size: 24px;
		}

		body {
			font: 16px/1rem sans-serif;
			margin: 0;
		}

		a {
			color: var(--base-color);
			text-decoration: none;
		}

		a:focus,
		a:hover {
			text-decoration: underline;
		}

		button {
			background: var(--base-color) linear-gradient(to bottom, rgba(255, 255, 255, .2), rgba(255, 255, 255, 0));
			border: 0;
			border-radius: 2px;
			color: #fff;
			cursor: pointer;
			font: inherit;
			font-size: .8125em;
			font-weight: bold;
			margin: .125rem;
			min-width: 1.25rem;
			padding: .125rem .5rem;
			white-space: nowrap;
		}

		button:focus,
		button:hover {
			background-color: var(--button-hover-bg);
		}

		button:active {
			box-shadow: 0 .5px 3px rgba(0, 0, 0, .2) inset, 0 0 0 1px rgba(0, 0, 0, .1) inset;
		}

		button:disabled {
			opacity: .5;
		}

		hr {
			border: 0;
			border-bottom: 1px solid #0006;
			margin: calc(.5rem - 1px) 0 .5rem;
		}

		.container {
			height: calc(100vh - 1.75rem);
		}

		.header {
			background: #fff;
			backdrop-filter: blur(1px);
			display: flex;
			position: relative;
			z-index: 10;
			box-shadow: 0 -1px var(--border-color) inset;
		}

		.header-form {
			display: flex;
			align-items: center;
			padding: .125rem;
			width: 100%;
		}

		.header-input {
			background: #fff;
			border: 1px solid transparent;
			border-radius: 2px;
			color: inherit;
			flex: 1;
			font: inherit;
			margin: .125rem;
			min-width: 0;
			padding: calc(.125rem - 1px) calc(.25rem - 1px);
		}

		.header-input:focus {
			border-color: var(--base-color);
			outline: 2px solid var(--base-color-lighter);
		}

		.instance {
			box-shadow: -1px 0 var(--border-color), 0 -1px var(--border-color);
			flex: 1;
			position: relative;
			z-index: 1;
		}

		.language-badge {
			background: var(--base-color);
			float: left;
			border-radius: 2px;
			color: #fff;
			font-size: .618em;
			font-weight: bold;
			line-height: 1;
			min-width: .75rem;
			padding: .2em;
			text-transform: uppercase;
			text-align: center;
			margin: .2rem .4em 0 0;
		}

		.language-highlight {
			font-weight: bold;
		}

		.main {
			display: flex;
			flex-wrap: wrap;
		}

		.menu {
			position: relative;
		}

		.menu button {
			padding: .125rem 0;
		}

		.menu-dropdown[hidden] {
			display: block;
			opacity: 0;
			top: calc(100% - .125rem);
			visibility: hidden;
		}

		.menu-dropdown {
			background: #fff;
			border-radius: 2px;
			filter: drop-shadow(0 0 .5rem #0006);
			list-style: none;
			min-width: 5rem;
			opacity: 1;
			padding: .5rem .75rem;
			position: absolute;
			right: .125rem;
			top: calc(100% + .125rem);
			transition: all .2s;
			white-space: nowrap;
		}

		.menu-dropdown::before {
			bottom: 100%;
			content: '';
			border: .25rem solid;
			border-color: transparent transparent #fff;
			position: absolute;
			right: .375rem;
		}

		.menu-list {
			list-style: none;
		}

		.menu-list + .menu-list {
			box-shadow: 0 1px #0006 inset;
			margin-top: .5rem;
			padding-top: .5rem;
		}
	</style>
</head>

<body v-scope @vue:mounted="mounted">
	<main class="main">
		<div
			v-for="instance in instances"
			class="instance"
			:key="instance.id"
		>
			<header class="header">
				<form class="header-form" @submit.prevent="instance.loadManifest()">
					<input
						v-model="instance.manifestUrl"
						type="url"
						id="manifestUrl"
						class="header-input"
						placeholder="IIIF manifest URL"
						aria-label="IIIF manifest URL"
						@focus="event.target.select()"
					>
					<button type="submit">Load</button>
					<div class="menu" @click.stop>
						<button
							type="button"
							:aria-controls="`dropdown-${instance.id}`"
							:aria-expanded="instance.dropdownOpen"
							@click="instance.dropdownOpen = !instance.dropdownOpen"
						>⋮</button>
						<ul
							v-if="instance.dropdownOpen"
							v-cloak
							:id="`dropdown-${instance.id}`"
							class="menu-dropdown"
						>
							<li>
								<a href="javascript:;" @click="addInstance()">Add instance</a>
							</li>
							<li v-if="instances.length > 1">
								<a href="javascript:;" @click="instance.remove()">Close instance</a>
							</li>
							<li>
								<hr>
							</li>
							<li
								v-for="name, code in languages"
								:key="code"
								:class="{ 'language-highlight': code === instance.language }"
							>
								<a href="javascript:;" @click="instance.setLanguage(code)">
									<span class="language-badge">{{ code }}</span>
									{{ name }}
								</a>
							</li>
						</ul>
					</div>
				</form>
			</header>
			<div :id="`container${instance.id}`" class="container"></div>
		</div>
	</main>

	<script type="module" src="/src/main.js"></script>
	<script>
		/* global PetiteVue, Tify */

		$VITE_PETITE_VUE; // eslint-disable-line

		const instances = PetiteVue.reactive([]);

		class Instance {
			constructor(options = {}) {
				this.id = options.id || '';
				while (instances.find((instance) => instance.id === this.id)) {
					this.id = ((parseInt(options.id, 10) || 1) + 1).toString();
				}

				this.dropdownOpen = false;
				this.language = options.language || 'en';
				this.manifestUrl = options.manifestUrl || '';
				this.tify = null;

				instances.push(this);
			}

			remove() {
				this.tify?.destroy();

				instances.splice(instances.findIndex((instance) => instance.id === this.id), 1);

				const url = new URL(window.location);
				url.searchParams.delete(`language${this.id}`);
				url.searchParams.delete(`manifest${this.id}`);
				url.searchParams.delete(`tify${this.id}`);
				window.history.pushState(null, '', url.toString());
			}

			loadManifest() {
				this.tify?.destroy();

				this.tify = new Tify({
					container: document.getElementById(`container${this.id}`),
					manifestUrl: this.manifestUrl,
					translationsDirUrl: 'translations',
					language: this.language,
					urlQueryKey: `tify${this.id}`,
				});

				// Expose latest instance for e2e tests
				window.tify = this.tify;

				// Update URL query if manifest was set via input
				const url = new URL(window.location);
				if (url.searchParams.get(`manifest${this.id}`) !== this.manifestUrl) {
					url.searchParams.set(`manifest${this.id}`, this.manifestUrl);
					window.history.pushState(null, '', url.toString());
				}
			}

			setLanguage(code) {
				this.language = code;

				this.tify?.setLanguage(code);

				const url = new URL(window.location);
				if (code === 'en') {
					url.searchParams.delete(`language${this.id}`);
				} else {
					url.searchParams.set(`language${this.id}`, code);
				}
				window.history.pushState(null, '', url.toString());
			}

			closeDropdown() {
				this.dropdownOpen = false;
			}
		}

		const app = PetiteVue.createApp({
			instances,
			languages: $VITE_LANGUAGES, // eslint-disable-line
			mounted() {
				// Restore state from URL query
				const params = (new URL(window.location)).searchParams;
				params.forEach((url, key) => {
					if (!key.startsWith('manifest')) {
						return;
					}

					const id = key.replace('manifest', '');

					const instance = new Instance({
						id,
						language: params.get(`language${id}`),
						manifestUrl: url,
						urlQueryKey: `tify${id}`,
					});

					this.$nextTick(() => {
						instance.loadManifest();
					});
				});

				if (!instances.length) {
					new Instance(); // eslint-disable-line no-new
				}

				document.addEventListener('click', () => instances.forEach((instance) => instance.closeDropdown()));
			},
			addInstance() {
				new Instance(); // eslint-disable-line no-new
			},
		});

		window.addEventListener('load', () => app.mount('body'));
	</script>
</body>
